<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DigiHelp AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <img src="/web/static/avatar.png" class="w-20 h-20 rounded-2xl object-cover mb-4 shadow-lg" alt="DigiHelp">
            <h1 class="text-3xl font-bold text-pink-600">DigiHelp AI</h1>
            <p class="text-center text-gray-500 mt-1">Inicia sesión para acceder al panel</p>
        </div>

        {% if error %}
        <p class="bg-red-100 text-red-600 p-3 rounded-lg mb-4 text-sm">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/web/login">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-600 mb-2">Usuario</label>
                <input type="text" name="user" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">Contraseña</label>
                <input type="password" name="pass" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition" required>
            </div>
            <button class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-pink-200 transition transform active:scale-95">
                Entrar al Panel
            </button>
        </form>
    </div>
</body>
</html>
